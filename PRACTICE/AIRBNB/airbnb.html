<!doctype html>
<html>
  <head>
    <title>Airbnb | Vacations, Rentals, Cabins, Beach Houses and More...</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/listing.css">
    <link rel="stylesheet" href="styles/nav.css">


    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">


  </head>

  <body>
    <nav class="nav-main-container">

      <div class="nav-top">
  
        <img class="brand-logo" src="https://upload.wikimedia.org/wikipedia/commons/6/69/Airbnb_Logo_B%C3%A9lo.svg">



        <div class="nav-top-category-container"> 

          <div class="homes-category">
            <img class="homes-category-illustration" src="images/homes.png" alt="an illustration of a modern home">
            <p>Homes</p>
          </div>

          <div class="experiences-category">
            <img class="experiences-category-illustration" src="images/experiences.png" alt="an illustration of a red and yellow hot air balloon">
            <p>Experiences</p>
          </div>

          <div class="services-category">
            <img class="services-category-illustration" src="images/services.png" alt="an illustration of a silverware">
            <p>Services</p>
          </div>

        </div>



        <div class="nav-top-button-group">
          <button class="host-button">Become a host</button>
          <button class="region-button">
            <i class="ph ph-globe-simple"></i>
          </button>
          <button class="menu-button">
            <i class="ph ph-list"></i>
          </button>

        </div>

      </div>

      <div class="nav-bottom">


       <div class="detail-entry-group-container">
        
        <button class="details-destination">
          <p class="detail-label">Where</p>
          <input class="destination-input" type="text" placeholder="Search destinations">
        </button>
        

        <div id="v-line-1" class=vertical-line></div>




        <button class="details-dates">
          <p class="detail-label">When</p>
          <p class="dates-placeholder"> Add dates</p>
          
        </button>


         <div id="v-line-2" class=vertical-line></div>


        <div class="details-guests">
          <p class="detail-label">Who</p>
          <p class="guests-placeholder"> Add guests</p>
          
          <button class="search-button">
            <img class="search-icon" src="images/magnifying-glass-bold.svg">
          </button>
          
        </div>

       </div>


      </div>
      
    </nav>

<!-- This iisss the enddddd.  of Nav 😉-->

</div>



  </body>
  
</html>
